services:
  backend:
    build:
      context: .
      dockerfile: Dockerfile.backend
    container_name: customer-segment-backend
    ports:
      - "8000:8000"
    env_file:
      - .env
    environment:
      DB_HOST: host.docker.internal
    restart: unless-stopped

  frontend:
    build:
      context: .
      dockerfile: Dockerfile.frontend
    container_name: customer-segment-frontend
    ports:
      - "8501:8501"
    environment:
      API_BASE_URL: http://backend:8000
    depends_on:
      - backend
    volumes:
      - ./notebooks:/app/notebooks:ro
    restart: unless-stopped

